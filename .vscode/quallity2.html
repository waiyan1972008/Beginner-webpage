<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body{
      background-color: midnightblue;
    }
    div{
      width: 200px;
      height: 200px;
      border: 2px solid black;
      position: absolute;
      margin: auto;
      top:0 ;
      left: 0;
      right: 0;
      bottom: 0;
      background: conic-gradient(red 30deg, yellow 60deg, blue 90deg, green 120deg,red 150deg, yellow 180deg, blue 210deg, green 240deg, red 270deg, yellow 300deg, blue 330deg, green 360deg);
      
    }
  </style>
</head>
<body>
  <div></div>
</body>
</html>
