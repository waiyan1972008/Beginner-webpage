<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Game Store</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #050b1f;
            color: #fff;
        }

        /* ===== MAIN GRID ===== */
        main {
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        /* ===== GAME ITEM ===== */
        .items {
            background: #0b1025;
            border-radius: 15px;
            overflow: hidden;
            display: none;
            /* hide first */
        }

        .items-head {
            position: relative;
        }

        .items-head img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .items-head button {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #1f6bff;
            border: none;
            border-radius: 8px;
        }

        .items-head button a {
            color: #fff;
            padding: 6px 12px;
            display: block;
            text-decoration: none;
        }

        .items h3 {
            padding: 10px;
            font-size: 18px;
        }

        .items p {
            padding: 0 10px 15px;
            font-size: 14px;
            color: #aaa;
        }

        /* ===== SKELETON ===== */
        #skeleton-container {
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .skeleton-item {
            height: 260px;
            border-radius: 15px;
            background: linear-gradient(90deg,
                    #1a1f35 25%,
                    #2a2f4f 37%,
                    #1a1f35 63%);
            background-size: 400% 100%;
            animation: shimmer 1.4s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -400px 0;
            }

            100% {
                background-position: 400px 0;
            }
        }
    </style>
</head>

<body>

    <!-- ===== SKELETON UI ===== -->
    <div id="skeleton-container">
        <div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
    </div>

    <!-- ===== GAME LIST ===== -->
    <main>

        <div class="items">
            <div class="items-head">
                <img src="fullsize/warzone.jpg">
                <button><a href="#">Get</a></button>
            </div>
            <h3>Call of Duty</h3>
            <p>4.4⭐ | FPS | Battle Royale</p>
        </div>

        <div class="items">
            <div class="items-head">
                <img src="fullsize/apex legend.webp">
                <button><a href="#">Get</a></button>
            </div>
            <h3>Apex Legends</h3>
            <p>4.5⭐ | FPS | Hero Shooter</p>
        </div>

        <div class="items">
            <div class="items-head">
                <img src="fullsize/cs2.webp">
                <button><a href="#">Get</a></button>
            </div>
            <h3>Counter Strike 2</h3>
            <p>4.7⭐ | Tactical FPS</p>
        </div>

        <div class="items">
            <div class="items-head">
                <img src="fullsize/fortnitefull.jpg">
                <button><a href="#">Get</a></button>
            </div>
            <h3>Fortnite</h3>
            <p>4.1⭐ | Battle Royale</p>
        </div>

    </main>

    <!-- ===== JS ===== -->
    <script>
        const skeleton = document.getElementById("skeleton-container");
        const items = document.querySelectorAll(".items");

        /* Fake loading time */
        setTimeout(() => {
            skeleton.style.display = "none";
            items.forEach(item => {
                item.style.display = "block";
            });
        }, 1000);
    </script>

</body>

</html>
