<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cash</title>
  <style>
    table {
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid rgb(52, 10, 206);
      padding: 5px 10px;
    }
    th {
      background-color: #a79e9e;
    }
  </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="style3.css">
</head>
<body>
      <div class="bar">
        <h2>FREE store</h2>
        <div class="cart"> </div>
        <i class="bi bi-cart3"> <div class="cartamount"> 0</div></i>
     
    </div>

  <form id="cashForm" method="get">
    <label for="username">Item</label>
    <input type="text" id="username" name="username">

    <label for="number">No.</label>
    <input type="number" id="number" name="number" size="4">

    <input type="button" value="Add" id="Add">
    <input type="reset" value="reset">
  </form>

  
  <table id="resultTable">
    <thead>
      <tr>
        <th>Item</th>
        <th>No.</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    
    function showURLData() {
      const params = new URLSearchParams(window.location.search);
      const username = params.get("username");
      const number = params.get("number");

      const tbody = document.querySelector("#resultTable tbody");
      tbody.innerHTML = "";

      if (username && number) {
        const items = decodeURIComponent(username).split(",");
        const numbers = decodeURIComponent(number).split(",");

        for (let i = 0; i < items.length; i++) {
          const row = document.createElement("tr");

          const tdItem = document.createElement("td");
          tdItem.textContent = items[i] || ",";
          row.appendChild(tdItem);

          const tdNumber = document.createElement("td");
          tdNumber.textContent = numbers[i] || ",";
          row.appendChild(tdNumber);

          tbody.appendChild(row);
        }
      }
    }

    
    showURLData();


    document.getElementById("cashForm").addEventListener("reset", function() {

      setTimeout(showURLData, 50);
    });
    document.getElementById("Add").addEventListener("click", function() {
      const params = new URLSearchParams(window.location.search);
      let item = document.getElementById("username").value.trim();
      let number = document.getElementById("number").value.trim();

      if (!item && !number) return;

      if (params.has("username") && item) {
        item = params.get("username") + "," + item;
      }
      if (params.has("number") && number) {
        number = params.get("number") + "," + number;
      }

      if (item) params.set("username", item);
      if (number) params.set("number", number);

      history.pushState(null, "", "?" + params.toString());

      document.getElementById("username").value = "";
      document.getElementById("number").value = "";

      showURLData();
    });
  </script>
</body>
</html>
